<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator | Shaikh Junaid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calc-header">
            <h2>Calculator</h2>
            <button id="theme-btn"><i class="fas fa-sun"></i></button>
        </div>
        
        <div class="history-container" id="history-container">
            <div class="history-list" id="history-list"></div>
            <button id="clear-history">Clear</button>
        </div>

        <div class="display">
            <div id="previous-operand"></div>
            <div id="current-operand">0</div>
        </div>

        <div class="keypad">
            <button class="btn fn" data-action="sin">sin</button>
            <button class="btn fn" data-action="cos">cos</button>
            <button class="btn fn" data-action="tan">tan</button>
            <button class="btn fn" data-action="pi">π</button>
            
            <button class="btn ac" data-action="clear">AC</button>
            <button class="btn" data-action="delete">DEL</button>
            <button class="btn fn" data-action="sqrt">√</button>
            <button class="btn op" data-action="divide">÷</button>
            
            <button class="btn num">7</button>
            <button class="btn num">8</button>
            <button class="btn num">9</button>
            <button class="btn op" data-action="multiply">×</button>
            
            <button class="btn num">4</button>
            <button class="btn num">5</button>
            <button class="btn num">6</button>
            <button class="btn op" data-action="subtract">-</button>
            
            <button class="btn num">1</button>
            <button class="btn num">2</button>
            <button class="btn num">3</button>
            <button class="btn op" data-action="add">+</button>
            
            <button class="btn fn" data-action="history"><i class="fas fa-history"></i></button>
            <button class="btn num">0</button>
            <button class="btn num">.</button>
            <button class="btn equals" data-action="calculate">=</button>
        </div>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
